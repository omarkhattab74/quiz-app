<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="output.css">
</head>

<body class="bg-gradient-to-br from-blue-400 via-blue-300 to-purple-400 h-screen">
    <div class="w-screen h-screen flex justify-center items-center">
        <div class="md:w-1/2 w-full shadow-2xl  bg-gradient-to-br from-blue-400 via-blue-300 to-purple-400 p-10">
            <h1 class="text-3xl font-bold text-white text-center">Quiz App</h1>
            <label for="number" class="text-white mt-5 block"> Number of Questions:</label>
            <select id="number" name="number" class="p-2 mt-1 w-full rounded-2xl px-3 outline-none bg-gray-200">
                <option value="7">7</option>
                <option value="8">8</option>
                <option value="9">9</option>
                <option value="10">10</option>
                <option value="11">11</option>
                <option value="12">12</option>
                <option value="13">13</option>
                <option value="14">14</option>
                <option value="15">15</option>
                <option value="16">16</option>
                <option value="17">17</option>
                <option value="18">18</option>
                <option value="19">19</option>
                <option value="20">20</option>
                <!-- Add more options as needed -->
            </select>
            <label for="category" class="text-white mt-5 block"> Select Category:</label>
            <select id="category" name="category" class="p-2 mt-1 w-full rounded-2xl px-3 outline-none bg-gray-200">
                <option value="">Any Category</option>
                <option value="9">General Knowledge</option>
                <option value="10">Entertainment: Books</option>
                <option value="11">Entertainment: Film</option>
                <option value="12">Entertainment: Music</option>
                <option value="13">Entertainment: Musicals & Theatres</option>
                <option value="14">Entertainment: Television</option>
                <option value="15">Entertainment: Video Games</option>
                <option value="16">Entertainment: Board Games</option>
                <option value="17">Science & Nature</option>
                <option value="18">Science: Computers</option>
                <option value="19">Science: Mathematics</option>
                <option value="20">Mythology</option>
                <option value="21">Sports</option>
                <option value="22">Geography</option>
                <option value="23">History</option>
                <option value="24">Politics</option>
                <option value="25">Art</option>
                <option value="26">Celebrities</option>
                <option value="27">Animals</option>
                <option value="28">Vehicles</option>
                <option value="29">Entertainment: Comics</option>
                <option value="30">Science: Gadgets</option>
                <option value="31">Entertainment: Japanese Anime & Manga</option>
                <option value="32">Entertainment: Cartoon & Animations</option>
                <!-- Add more options as needed -->
            </select>
            <label for="difficulty" class="text-white mt-5 block"> Select Difficulty:</label>
            <select id="difficulty" name="difficulty" class="p-2 mt-1 w-full rounded-2xl px-3 outline-none bg-gray-200">
                <option value="">Any Difficulty</option>
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard">Hard</option>

                <!-- Add more options as needed -->
            </select>
            
            <label for="Type" class="text-white mt-5 block"> Select Type:</label>
            <select id="Type" name="Type" class="p-2 mt-1 w-full rounded-2xl px-3 outline-none bg-gray-200">
                <option value="">Any Type</option>
                <option value="multiple">Multiple Choice</option>
                <option value="boolean">True / False</option>

                <!-- Add more options as needed -->
            </select>

            <button class=" startBtn bg-blue-500 my-3 duration-200 mx-auto block hover:bg-blue-700 text-white font-bold py-1 px-3 rounded-xl">
                Start quiz
            </button>
        </div>
    </div>

    <script src="main.js"></script>
</body>

</html>
